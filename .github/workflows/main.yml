name: Build and Publish Python Client

on:
  workflow_dispatch:
  push:
    branches: ["main"]
    tags:
      - "v*.*.*"
  pull_request:
    branches: ["main"]
  release:
    types: [published]

jobs:
  build:
    name: Build and test package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          pip install build
          pip install -e .

      - name: Import smoke test
        run: python -c "from mvr_api import MVRClient, MVRConfig; print(MVRClient(MVRConfig()).config.base_url)"

      - name: Build package
        run: python -m build

  publish:
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'release'
    needs: build
    name: Publish to PyPI
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install publish tooling
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build package
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
